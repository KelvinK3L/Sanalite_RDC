<!DOCTYPE html>
<html lang="fr">
<head>

</head>

<body>

        <input type="email"
               placeholder="E-mail du centre de santé"

        <input type="password"
               placeholder="Mot de passe"
               id="mot_de_passe">

<select id="service">

        <option value="Admin">Administrateur</option>


</select>

        <input type="text" id="nom_serveur" placeholder="Le nom de votre serveur ou votre database">

        <input type="password" placeholder="Confirmer le mot de passe de votre serveur ou database">

        <div class="pied">

            </button>

            <button class="btn3" onclick="window.location.href='index.html'">
                Annuler

    </div>
            <button class="darkmode" onclick="changerMode()">

        </button>
